strict: true

included:
  - Package.swift
  - Sources
  - Tests

opt_in_rules: all

# Swift Format owns brace placement and uses inferred local types. The model's
# optional Bool represents loading/error plus the two resolved pmset states.
# This is a Swift 6-only package, and classes without owned resources do not
# benefit from empty deinitializers. The two extension-access and string-enum
# rule pairs are mutually exclusive; explicit stable persistence values and
# member-level access control are used here.
disabled_rules:
  - contrasted_opening_brace
  - discouraged_optional_boolean
  - explicit_type_interface
  - incompatible_concurrency_annotation
  - prefixed_toplevel_constant
  - extension_access_modifier
  - redundant_string_enum_value
  - required_deinit

nesting:
  type_level:
    warning: 1
    error: 1
  function_level:
    warning: 3
    error: 3
  check_nesting_in_closures_and_statements: true
  always_allow_one_type_in_functions: false
  ignore_typealiases_and_associatedtypes: false
  ignore_coding_keys: false

function_body_length:
  warning: 30
  error: 40

closure_body_length:
  warning: 20
  error: 30

cyclomatic_complexity:
  warning: 5
  error: 7

file_length:
  warning: 180
  error: 220

type_body_length:
  warning: 120
  error: 150

file_name:
  excluded:
    - Package.swift

indentation_width:
  indentation_width: 2
  include_comments: true
  include_compiler_directives: true
  include_multiline_strings: true
  include_multiline_conditions: false

trailing_comma:
  mandatory_comma: true

line_length:
  warning: 100
  error: 100
  ignores_comments: false
  ignores_interpolated_strings: false
  ignores_urls: false
